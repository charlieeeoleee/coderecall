<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Code Recall</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header class="navbar">
  <div class="logo">CODE: RECALL</div>
  <button onclick="logout()" class="logout-btn">Logout</button>
</header>

<div class="main-container">

  <!-- WELCOME -->
  <div class="welcome-box">
    <h2>Welcome, <span id="username">Charles</span></h2>
    <p>Email: <span id="email">charles@email.com</span></p>
  </div>

  <!-- PROGRESS (FIXED) -->
  <div class="progress-box">
    <p><strong>XP:</strong> <span id="xp">150</span></p>
    <p><strong>Level:</strong> <span id="level">2</span></p>

    <p><strong>Progress: <span id="progressText">50%</span></strong></p>

    <div class="progress-bar">
      <div id="progressFill" style="width:50%"></div>
    </div>
  </div>

  <!-- SUBJECT -->
  <div class="subject-box">
    <h3>Subjects</h3>
    <button>🖥 Computer Hardware</button>
    <button>⚡ Electrical Circuits</button>
  </div>

</div>

<button class="theme-toggle">🌙</button>

</body>
</html>
