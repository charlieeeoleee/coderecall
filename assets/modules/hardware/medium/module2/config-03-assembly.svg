<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title>Assembly Sequence</title>
  <desc>Mount the board carefully, connect the power supply, seat memory properly, and check front panel, storage, and cooling connections.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320" />
      <stop offset="100%" stop-color="#16253a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.16" />
    </linearGradient>
    <linearGradient id="caseFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17324b" />
      <stop offset="100%" stop-color="#0d1c2f" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="36" fill="url(#bg)" />
  <circle cx="1035" cy="140" r="150" fill="#0ea5e9" opacity="0.18" />
  <circle cx="160" cy="760" r="120" fill="#0ea5e9" opacity="0.14" />
  <rect x="72" y="72" width="220" height="54" rx="27" fill="#0ea5e9" opacity="0.18" stroke="#0ea5e9" stroke-opacity="0.5" />
  <text x="182" y="107" text-anchor="middle" fill="#f7fbff" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="700">Setup</text>
  <text x="72" y="220" fill="#f7fbff" font-family="Montserrat, Arial, sans-serif" font-size="62" font-weight="800">Assembly Sequence</text>
  <text x="72" y="290" fill="#9fd1ff" font-family="Montserrat, Arial, sans-serif" font-size="30" font-weight="600">Install parts in a logical order</text>

  <rect x="72" y="350" width="1056" height="300" rx="32" fill="#0f1b2d" stroke="#0ea5e9" stroke-opacity="0.35" />
  <rect x="96" y="378" width="10" height="244" rx="5" fill="#0ea5e9" />
  <text x="132" y="430" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="34" font-weight="700">Key Idea</text>
  <foreignObject x="132" y="458" width="500" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Montserrat, Arial, sans-serif; font-size: 28px; line-height: 1.5; color: #d9e8f5;">
      Mount the board carefully, connect the power supply, seat memory properly, and check front panel, storage, and cooling connections.
    </div>
  </foreignObject>

  <g transform="translate(674 380)">
    <rect width="398" height="230" rx="24" fill="url(#caseFrame)" stroke="#38bdf8" stroke-opacity="0.35" />
    <rect x="26" y="22" width="220" height="186" rx="18" fill="#0b1728" stroke="#7dd3fc" stroke-opacity="0.25" />
    <rect x="46" y="42" width="126" height="112" rx="16" fill="#10263b" stroke="#60a5fa" stroke-opacity="0.35" />
    <circle cx="72" cy="68" r="14" fill="#0f1b2d" stroke="#93c5fd" stroke-width="4" />
    <rect x="94" y="54" width="58" height="28" rx="8" fill="#0f1b2d" stroke="#7dd3fc" stroke-opacity="0.4" />
    <rect x="60" y="96" width="98" height="14" rx="7" fill="#1d4ed8" opacity="0.55" />
    <rect x="60" y="118" width="98" height="14" rx="7" fill="#1d4ed8" opacity="0.32" />
    <rect x="186" y="42" width="34" height="56" rx="8" fill="#0f1b2d" stroke="#7dd3fc" stroke-opacity="0.32" />
    <rect x="186" y="106" width="34" height="48" rx="8" fill="#0f1b2d" stroke="#7dd3fc" stroke-opacity="0.32" />
    <rect x="56" y="166" width="162" height="20" rx="10" fill="#0f1b2d" stroke="#7dd3fc" stroke-opacity="0.3" />
    <rect x="272" y="34" width="92" height="74" rx="14" fill="#10263b" stroke="#7dd3fc" stroke-opacity="0.28" />
    <circle cx="318" cy="71" r="22" fill="#0f1b2d" stroke="#bfdbfe" stroke-width="4" />
    <circle cx="318" cy="71" r="10" fill="#7dd3fc" opacity="0.45" />
    <rect x="274" y="130" width="88" height="38" rx="12" fill="#10263b" stroke="#7dd3fc" stroke-opacity="0.28" />
    <path d="M288 150 h24 M324 150 h24" stroke="#dbeafe" stroke-width="4" stroke-linecap="round" />
    <path d="M258 186 C276 170 298 170 318 186" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
    <path d="M318 186 C336 174 350 174 366 192" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />

    <g transform="translate(18 -6)">
      <circle cx="30" cy="30" r="18" fill="#0ea5e9" />
      <text x="30" y="37" text-anchor="middle" fill="#04111f" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="800">1</text>
      <circle cx="88" cy="18" r="18" fill="#38bdf8" />
      <text x="88" y="25" text-anchor="middle" fill="#04111f" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="800">2</text>
      <circle cx="146" cy="30" r="18" fill="#7dd3fc" />
      <text x="146" y="37" text-anchor="middle" fill="#04111f" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="800">3</text>
      <circle cx="204" cy="18" r="18" fill="#bae6fd" />
      <text x="204" y="25" text-anchor="middle" fill="#04111f" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="800">4</text>
    </g>

    <text x="30" y="216" fill="#bfeaf5" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="600">board</text>
    <text x="274" y="216" fill="#bfeaf5" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="600">power, memory, and cables</text>
  </g>

  <rect x="72" y="706" width="1056" height="110" rx="28" fill="url(#accent)" opacity="0.95" />
  <text x="100" y="770" fill="#08111f" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="800">Order matters during assembly</text>
</svg>
