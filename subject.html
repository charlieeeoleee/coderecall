<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subject - Code Recall</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="subject.css">
</head>
<body>

  <!-- TOP LEFT LOGO -->
  <div class="subject-logo">
    <span class="subject-logo-code">CODE:</span>
    <span class="subject-logo-recall">RECALL!</span>
  </div>

  <!-- THEME TOGGLE -->
  <button class="theme-toggle" onclick="toggleTheme()">
    <span id="themeIcon">🌙</span>
  </button>

  <main class="subject-page">
    <div class="subject-header card">
      <h1 class="subject-title" id="subjectTitle">
        ELECTRICAL WIRING AND ELECTRONICS CIRCUIT COMPONENTS
      </h1>
      <p class="subject-desc" id="subjectDesc">
        Take the pre-test, study the modules, answer quizzes, and finish the post-test.
      </p>
    </div>

    <div class="subject-actions">
      <button class="subject-card card" id="pretestBtn" onclick="openPretest()">
        <h2>Pre-Test</h2>
        <p>Take the assessment first</p>
      </button>

      <button class="subject-card card locked" id="modulesBtn" onclick="openModules()">
        <span class="lock-icon">🔒</span>
        <h2>Modules</h2>
        <p>Read the lessons</p>
      </button>

      <button class="subject-card card locked" id="quizzesBtn" onclick="openQuiz()">
        <span class="lock-icon">🔒</span>
        <h2>Quizzes</h2>
        <p>Answer module quizzes</p>
      </button>

      <button class="subject-card card locked" id="posttestBtn" onclick="openPosttest()">
        <span class="lock-icon">🔒</span>
        <h2>Post-Test</h2>
        <p>Final assessment</p>
      </button>
    </div>
  </main>

  <!-- BACK BUTTON -->
  <button class="subject-back-btn" onclick="goBack()">← Back</button>

  <script src="subject.js"></script>
</body>
</html>
