<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title>Post-Assembly Testing</title>
  <desc>Use POST, display output, fan behavior, and hardware detection checks to confirm the computer is assembled and configured correctly.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320" />
      <stop offset="100%" stop-color="#16253a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.16" />
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2942" />
      <stop offset="100%" stop-color="#101b30" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="36" fill="url(#bg)" />
  <circle cx="1035" cy="140" r="150" fill="#a855f7" opacity="0.18" />
  <circle cx="160" cy="760" r="120" fill="#a855f7" opacity="0.14" />
  <rect x="72" y="72" width="220" height="54" rx="27" fill="#a855f7" opacity="0.18" stroke="#a855f7" stroke-opacity="0.5" />
  <text x="182" y="107" text-anchor="middle" fill="#f7fbff" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="700">Setup</text>
  <text x="72" y="220" fill="#f7fbff" font-family="Montserrat, Arial, sans-serif" font-size="62" font-weight="800">Post-Assembly Testing</text>
  <text x="72" y="290" fill="#9fd1ff" font-family="Montserrat, Arial, sans-serif" font-size="30" font-weight="600">Verify the build after installation</text>

  <rect x="72" y="350" width="1056" height="300" rx="32" fill="#0f1b2d" stroke="#a855f7" stroke-opacity="0.35" />
  <rect x="96" y="378" width="10" height="244" rx="5" fill="#a855f7" />
  <text x="132" y="430" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="34" font-weight="700">Key Idea</text>
  <foreignObject x="132" y="458" width="500" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Montserrat, Arial, sans-serif; font-size: 28px; line-height: 1.5; color: #d9e8f5;">
      Use POST, display output, fan behavior, and hardware detection checks to confirm the computer is assembled and configured correctly.
    </div>
  </foreignObject>

  <g transform="translate(680 384)">
    <rect width="390" height="226" rx="24" fill="#122038" stroke="#c084fc" stroke-opacity="0.3" />
    <rect x="24" y="22" width="206" height="136" rx="18" fill="url(#screen)" stroke="#d8b4fe" stroke-opacity="0.28" />
    <rect x="44" y="40" width="166" height="100" rx="12" fill="#0b1220" stroke="#c084fc" stroke-opacity="0.25" />
    <text x="62" y="68" fill="#f5e9ff" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="700">POST CHECK</text>
    <rect x="62" y="82" width="130" height="12" rx="6" fill="#22c55e" opacity="0.85" />
    <rect x="62" y="102" width="146" height="12" rx="6" fill="#60a5fa" opacity="0.75" />
    <rect x="62" y="122" width="118" height="12" rx="6" fill="#a78bfa" opacity="0.75" />
    <rect x="98" y="158" width="58" height="12" rx="6" fill="#334155" />
    <rect x="112" y="170" width="30" height="26" rx="6" fill="#334155" />

    <rect x="256" y="28" width="102" height="160" rx="16" fill="#0f172a" stroke="#c084fc" stroke-opacity="0.28" />
    <circle cx="307" cy="78" r="28" fill="#111827" stroke="#d8b4fe" stroke-width="4" />
    <path d="M307 50 a28 28 0 0 1 0 56 a28 28 0 0 1 0 -56" fill="none" stroke="#8b5cf6" stroke-width="4" stroke-dasharray="10 8" />
    <rect x="276" y="126" width="62" height="16" rx="8" fill="#1f2937" />
    <rect x="276" y="150" width="48" height="16" rx="8" fill="#1f2937" />

    <circle cx="74" cy="196" r="16" fill="#22c55e" />
    <path d="M67 196 l5 5 l10 -12" fill="none" stroke="#04111f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="102" y="201" fill="#cbd5f5" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="600">display output</text>
    <circle cx="222" cy="196" r="16" fill="#60a5fa" />
    <path d="M216 188 v16 M228 188 v16 M216 196 h12" stroke="#04111f" stroke-width="4" stroke-linecap="round" />
    <text x="250" y="201" fill="#cbd5f5" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="600">hardware detected</text>
  </g>

  <rect x="72" y="706" width="1056" height="110" rx="28" fill="url(#accent)" opacity="0.95" />
  <text x="100" y="770" fill="#08111f" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="800">Testing completes the setup cycle</text>
</svg>
