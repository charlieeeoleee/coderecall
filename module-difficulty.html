<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Module Difficulty - Code Recall</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/module-difficulty.css">
  <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>
  <a href="dashboard.html" class="difficulty-logo" aria-label="Go to dashboard">
    <span class="difficulty-logo-code">CODE:</span>
    <span class="difficulty-logo-recall">RECALL!</span>
  </a>

  <button class="theme-toggle difficulty-theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="themeIcon">&#127769;</span>
  </button>

  <main class="difficulty-page">
    <section class="difficulty-header card">
      <div class="difficulty-header-glow"></div>
      <span class="difficulty-tag">MODULE DIFFICULTY</span>
      <h1 class="difficulty-title" id="difficultyTitle">Choose Module Difficulty</h1>
      <p class="difficulty-subtitle" id="difficultySubtitle">
        Select a difficulty before opening the modules.
      </p>
    </section>

    <section class="difficulty-grid">
      <button class="difficulty-card difficulty-easy card" onclick="openDifficulty('easy')">
        <div class="difficulty-card-glow"></div>
        <div class="difficulty-card-inner">
          <span class="difficulty-badge">BEGINNER</span>
          <h2>Easy</h2>
          <p>Basic concepts and simple lessons.</p>
        </div>
      </button>

      <button class="difficulty-card difficulty-medium card locked" id="mediumBtn">
        <div class="difficulty-card-glow"></div>
        <div class="difficulty-card-inner">
          <span class="difficulty-badge">INTERMEDIATE</span>
          <h2>Medium</h2>
          <p>Unlocks after finishing Easy modules.</p>
        </div>
      </button>

      <button class="difficulty-card difficulty-hard card locked" id="hardBtn">
        <div class="difficulty-card-glow"></div>
        <div class="difficulty-card-inner">
          <span class="difficulty-badge">ADVANCED</span>
          <h2>Hard</h2>
          <p>Unlocks after finishing Medium modules.</p>
        </div>
      </button>
    </section>
  </main>

    <button class="difficulty-back-btn" onclick="goBack()">Back</button>

  <script type="module">
    import {
      initSounds,
      initGlobalClickSound,
      tryStartMusic,
      restartThemeMusic
    } from "./scripts/sound.js";

    (function () {
      const params = new URLSearchParams(window.location.search);
      const subjectParam = (params.get("subject") || "").toLowerCase();
      const unlockMode = (params.get("unlock") || "").toLowerCase();
      const savedSubject = (sessionStorage.getItem("selectedSubject") || "").toLowerCase();
      const validSubjects = new Set(["hardware", "electrical"]);
      const subject = validSubjects.has(subjectParam)
        ? subjectParam
        : validSubjects.has(savedSubject)
          ? savedSubject
          : "electrical";

      sessionStorage.setItem("selectedSubject", subject);

      const titleEl = document.getElementById("difficultyTitle");
      const subtitleEl = document.getElementById("difficultySubtitle");

      const subjectTitles = {
        electrical: "Electrical Module Difficulty",
        hardware: "Computer Hardware Module Difficulty"
      };

      const subjectDescriptions = {
        electrical: "Choose the difficulty for the Electrical modules before opening the lessons.",
        hardware: "Choose the difficulty for the Computer Hardware modules before opening the lessons."
      };

      if (titleEl) {
        titleEl.textContent = subjectTitles[subject] || "Choose Module Difficulty";
      }

      if (subtitleEl) {
        subtitleEl.textContent = subjectDescriptions[subject] || "Select a difficulty before opening the modules.";
      }

      function updateIcon() {
        const icon = document.getElementById("themeIcon");
        if (!icon) return;
        icon.textContent = document.body.classList.contains("light-mode") ? "\u2600\uFE0F" : "\uD83C\uDF19";
      }

      function loadTheme() {
        const saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.body.classList.add("light-mode");
        }
        updateIcon();
      }

      function buildUrl(path, extraParams = {}) {
        const url = new URL(path, window.location.href);
        Object.entries(extraParams).forEach(([key, value]) => {
          if (value != null && value !== "") {
            url.searchParams.set(key, value);
          }
        });
        if (unlockMode) {
          url.searchParams.set("unlock", unlockMode);
        }
        return `${url.pathname.split("/").pop()}${url.search}`;
      }

      window.goBack = function () {
        window.location.href = buildUrl("subject.html", { subject });
      };

      window.openDifficulty = function (difficulty) {
        window.location.href = buildUrl("module-levels.html", { subject, difficulty });
      };

      window.toggleTheme = function () {
        document.body.classList.toggle("light-mode");
        localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
        updateIcon();
        restartThemeMusic();
      };

      loadTheme();
      initSounds();
      initGlobalClickSound();
      tryStartMusic();
      document.body.addEventListener("click", () => {
        tryStartMusic();
      }, { once: true });
    })();
  </script>
  <script type="module" src="scripts/module-difficulty.js"></script>
  <script src="scripts/loading.js" defer></script>
</body>
</html>
