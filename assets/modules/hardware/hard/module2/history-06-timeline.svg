<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title>Computer History Timeline</title>
  <desc>This timeline view helps learners connect inventors, theories, hardware advances, and networking breakthroughs into one clear story of computer evolution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320" />
      <stop offset="100%" stop-color="#16253a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.16" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="36" fill="url(#bg)" />
  <circle cx="1035" cy="140" r="150" fill="#22c55e" opacity="0.18" />
  <circle cx="160" cy="760" r="120" fill="#22c55e" opacity="0.14" />
  <rect x="72" y="72" width="220" height="54" rx="27" fill="#22c55e" opacity="0.18" stroke="#22c55e" stroke-opacity="0.5" />
  <text x="182" y="107" text-anchor="middle" fill="#f7fbff" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="700">History</text>
  <text x="72" y="220" fill="#f7fbff" font-family="Montserrat, Arial, sans-serif" font-size="62" font-weight="800">Computer History Timeline</text>
  <text x="72" y="290" fill="#9fd1ff" font-family="Montserrat, Arial, sans-serif" font-size="30" font-weight="600">From mechanical ideas to connected systems</text>
  <rect x="72" y="350" width="1056" height="300" rx="32" fill="#0f1b2d" stroke="#22c55e" stroke-opacity="0.35" />
  <rect x="96" y="378" width="10" height="244" rx="5" fill="#22c55e" />
  <text x="132" y="430" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="34" font-weight="700">Key Idea</text>
  <foreignObject x="132" y="458" width="940" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Montserrat, Arial, sans-serif; font-size: 28px; line-height: 1.5; color: #d9e8f5;">
      This timeline view helps learners connect inventors, theories, hardware advances, and networking breakthroughs into one clear story of computer evolution.
    </div>
  </foreignObject>
  <rect x="72" y="706" width="1056" height="110" rx="28" fill="url(#accent)" opacity="0.95" />
  <text x="100" y="770" fill="#08111f" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="800">Review: match each inventor to a contribution</text>
</svg>
