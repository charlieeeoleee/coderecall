<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title>Safe Workspace Preparation</title>
  <desc>Set up a clean surface, organize screws and tools, and use ESD protection so assembly starts safely and efficiently.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320" />
      <stop offset="100%" stop-color="#16253a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.16" />
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17324b" />
      <stop offset="100%" stop-color="#0d1c2f" />
    </linearGradient>
    <linearGradient id="mat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#103240" />
      <stop offset="100%" stop-color="#164e63" />
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="36" fill="url(#bg)" />
  <circle cx="1035" cy="140" r="150" fill="#14b8a6" opacity="0.18" />
  <circle cx="160" cy="760" r="120" fill="#14b8a6" opacity="0.14" />
  <rect x="72" y="72" width="220" height="54" rx="27" fill="#14b8a6" opacity="0.18" stroke="#14b8a6" stroke-opacity="0.5" />
  <text x="182" y="107" text-anchor="middle" fill="#f7fbff" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="700">Setup</text>
  <text x="72" y="220" fill="#f7fbff" font-family="Montserrat, Arial, sans-serif" font-size="62" font-weight="800">Safe Workspace Preparation</text>
  <text x="72" y="290" fill="#9fd1ff" font-family="Montserrat, Arial, sans-serif" font-size="30" font-weight="600">Prepare before touching components</text>

  <rect x="72" y="350" width="1056" height="300" rx="32" fill="#0f1b2d" stroke="#14b8a6" stroke-opacity="0.35" />
  <rect x="96" y="378" width="10" height="244" rx="5" fill="#14b8a6" />
  <text x="132" y="430" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="34" font-weight="700">Key Idea</text>
  <foreignObject x="132" y="458" width="500" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Montserrat, Arial, sans-serif; font-size: 28px; line-height: 1.5; color: #d9e8f5;">
      Set up a clean surface, organize screws and tools, and use ESD protection so assembly starts safely and efficiently.
    </div>
  </foreignObject>

  <g transform="translate(690 388)">
    <rect width="380" height="224" rx="24" fill="url(#desk)" stroke="#2dd4bf" stroke-opacity="0.35" />
    <rect x="28" y="28" width="168" height="112" rx="16" fill="url(#mat)" stroke="#67e8f9" stroke-opacity="0.35" />
    <rect x="48" y="48" width="128" height="72" rx="12" fill="#0d2134" stroke="#5eead4" stroke-opacity="0.3" />
    <circle cx="66" cy="66" r="8" fill="#14b8a6" opacity="0.7" />
    <circle cx="158" cy="102" r="10" fill="#14b8a6" opacity="0.35" />
    <rect x="226" y="30" width="64" height="64" rx="12" fill="#112a43" stroke="#7dd3fc" stroke-opacity="0.28" />
    <path d="M250 72 l12 -24 l12 24" fill="none" stroke="#dbeafe" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M262 62 v20" stroke="#dbeafe" stroke-width="4" stroke-linecap="round" />
    <rect x="304" y="30" width="48" height="64" rx="12" fill="#112a43" stroke="#7dd3fc" stroke-opacity="0.28" />
    <circle cx="328" cy="46" r="7" fill="#34d399" />
    <circle cx="328" cy="62" r="7" fill="#34d399" />
    <circle cx="328" cy="78" r="7" fill="#34d399" />
    <rect x="220" y="114" width="132" height="82" rx="18" fill="#0d2134" stroke="#5eead4" stroke-opacity="0.28" />
    <rect x="236" y="130" width="44" height="18" rx="9" fill="#14b8a6" opacity="0.2" />
    <text x="258" y="144" text-anchor="middle" fill="#dffcf9" font-family="Montserrat, Arial, sans-serif" font-size="11" font-weight="700">ESD</text>
    <path d="M252 170 c16 -28 44 -28 60 0" fill="none" stroke="#e6fffb" stroke-width="4" stroke-linecap="round" />
    <path d="M282 146 v48" stroke="#e6fffb" stroke-width="4" stroke-linecap="round" />
    <circle cx="92" cy="182" r="22" fill="#10263b" stroke="#7dd3fc" stroke-opacity="0.3" />
    <g stroke="#d9f8ff" stroke-width="4" stroke-linecap="round">
      <path d="M84 174 l16 16" />
      <path d="M100 174 l-16 16" />
    </g>
    <circle cx="150" cy="182" r="22" fill="#10263b" stroke="#7dd3fc" stroke-opacity="0.3" />
    <path d="M142 190 l10 -16 l8 8 l8 -18" fill="none" stroke="#d9f8ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <text x="190" y="210" text-anchor="end" fill="#bfeaf5" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="600">clean area</text>
    <text x="352" y="210" text-anchor="end" fill="#bfeaf5" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="600">tools and ESD ready</text>
  </g>

  <rect x="72" y="706" width="1056" height="110" rx="28" fill="url(#accent)" opacity="0.95" />
  <text x="100" y="770" fill="#08111f" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="800">Preparation makes assembly smoother</text>
</svg>
