<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1140" viewBox="0 0 1400 1140">
  <rect width="1400" height="1140" rx="48" fill="#162338"/>
  <circle cx="1220" cy="120" r="150" fill="#20d5a5" opacity="0.14"/>
  <rect x="80" y="70" width="190" height="52" rx="26" fill="#20d5a5" opacity="0.2" stroke="#20d5a5"/>
  <text x="175" y="104" text-anchor="middle" fill="#f7fbff" font-family="Montserrat,Arial,sans-serif" font-size="25" font-weight="700">History</text>
  <text x="80" y="180" fill="#ffffff" font-family="Montserrat,Arial,sans-serif" font-size="62" font-weight="800">Computer History Timeline</text>
  <text x="80" y="235" fill="#9fd1ff" font-family="Montserrat,Arial,sans-serif" font-size="30" font-weight="600">From mechanical ideas to connected systems</text>
  <path d="M120 470 H1280" stroke="#50e3c2" stroke-width="14" stroke-linecap="round"/>

  <g font-family="Montserrat,Arial,sans-serif" text-anchor="middle">
    <circle cx="170" cy="470" r="22" fill="#ffb84d"/>
    <text x="170" y="430" fill="#fff" font-size="24" font-weight="700">1830s</text>
    <text x="170" y="530" fill="#fff" font-size="20" font-weight="700">Babbage</text>

    <circle cx="320" cy="470" r="22" fill="#ff4d8d"/>
    <text x="320" y="430" fill="#fff" font-size="24" font-weight="700">1840s</text>
    <text x="320" y="530" fill="#fff" font-size="20" font-weight="700">Lovelace</text>

    <circle cx="500" cy="470" r="22" fill="#ffcf85"/>
    <text x="500" y="430" fill="#fff" font-size="24" font-weight="700">1941</text>
    <text x="500" y="530" fill="#fff" font-size="20" font-weight="700">Zuse</text>

    <circle cx="660" cy="470" r="22" fill="#54b7ff"/>
    <text x="660" y="430" fill="#fff" font-size="24" font-weight="700">1940s</text>
    <text x="660" y="530" fill="#fff" font-size="20" font-weight="700">Turing</text>

    <circle cx="830" cy="470" r="22" fill="#5dbdff"/>
    <text x="830" y="430" fill="#fff" font-size="24" font-weight="700">1945</text>
    <text x="830" y="530" fill="#fff" font-size="18" font-weight="700">von Neumann</text>

    <circle cx="980" cy="470" r="22" fill="#50e3c2"/>
    <text x="980" y="430" fill="#fff" font-size="24" font-weight="700">1950s</text>
    <text x="980" y="530" fill="#fff" font-size="20" font-weight="700">Hopper</text>

    <circle cx="1140" cy="470" r="22" fill="#8c5bff"/>
    <text x="1140" y="430" fill="#fff" font-size="24" font-weight="700">1970s+</text>
    <text x="1140" y="528" fill="#fff" font-size="16" font-weight="700">Metcalfe</text>
    <text x="1140" y="552" fill="#fff" font-size="16" font-weight="700">Berners-Lee</text>
  </g>

  <rect x="90" y="620" width="1220" height="180" rx="28" fill="#0f1b2d" stroke="#20d5a5" stroke-opacity="0.24"/>
  <text x="130" y="678" fill="#ffffff" font-family="Montserrat,Arial,sans-serif" font-size="30" font-weight="800">Key flow</text>
  <text x="130" y="730" fill="#dcecff" font-family="Montserrat,Arial,sans-serif" font-size="22">Mechanical concepts led to programming ideas, then early machines, then computing theory, architecture, software, networking, and finally the web.</text>
  <text x="130" y="768" fill="#dcecff" font-family="Montserrat,Arial,sans-serif" font-size="22">Use this timeline to match each name with the contribution that moved computing forward.</text>

  <rect x="90" y="835" width="1220" height="200" rx="28" fill="#12213a" stroke="#8c5bff" stroke-opacity="0.28"/>
  <text x="130" y="892" fill="#ffffff" font-family="Montserrat,Arial,sans-serif" font-size="30" font-weight="800">Contribution guide</text>
  <text x="130" y="944" fill="#dcecff" font-family="Montserrat,Arial,sans-serif" font-size="22">Babbage and Lovelace represent early machine and programming ideas.</text>
  <text x="130" y="980" fill="#dcecff" font-family="Montserrat,Arial,sans-serif" font-size="22">Zuse, Turing, and von Neumann connect to early computer design and theory.</text>
  <text x="130" y="1016" fill="#dcecff" font-family="Montserrat,Arial,sans-serif" font-size="22">Hopper, Metcalfe, and Berners-Lee extend the story into software languages, networking, and the modern web.</text>
</svg>
