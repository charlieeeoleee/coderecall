<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Level - Code Recall</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/quiz-level.css?v=20260412l">
  <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>
  <a href="dashboard.html" class="level-logo" aria-label="Go to dashboard">
    <span class="level-logo-code">CODE:</span>
    <span class="level-logo-recall">RECALL!</span>
  </a>

  <button class="theme-toggle level-theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="themeIcon">&#127769;</span>
  </button>

  <section class="sound-toggle-panel level-sound-panel" aria-label="Sound controls">
    <label class="sound-toggle-item" for="sfxToggle">
      <span class="sound-toggle-label">SFX</span>
      <span class="sound-toggle-switch">
        <input type="checkbox" id="sfxToggle" />
        <span class="sound-toggle-slider" aria-hidden="true"></span>
      </span>
    </label>
    <label class="sound-toggle-item" for="bgmToggle">
      <span class="sound-toggle-label">BGM</span>
      <span class="sound-toggle-switch">
        <input type="checkbox" id="bgmToggle" />
        <span class="sound-toggle-slider" aria-hidden="true"></span>
      </span>
    </label>
  </section>

  <main class="level-page">
    <section class="level-header card">
      <span class="level-tag" id="levelTag">QUIZ LEVEL</span>
      <h1 class="level-title" id="levelTitle">Level 1</h1>
      <p class="level-subtitle" id="levelSubtitle">Answer 3 questions to complete this level and earn 6 XP.</p>
    </section>

    <section class="level-main card">
      <div class="level-topbar">
        <div class="level-counter" id="questionCounter">Question 1 of 3</div>
        <div class="level-xp">Reward: 6 XP</div>
      </div>

      <div class="level-progress-wrap">
        <div class="level-progress-track">
          <div class="level-progress-fill" id="levelProgressFill"></div>
        </div>
        <div class="level-progress-text" id="levelProgressText">0% Completed</div>
      </div>

      <div class="level-question-block">
        <h2 class="level-question-text" id="questionText">Loading question...</h2>
        <div class="level-question-media" id="questionMedia"></div>
      </div>

      <div class="level-choices-grid" id="choicesContainer"></div>

      <div class="level-actions">
      <button class="level-btn secondary-btn" id="backBtn" onclick="goBackToLevels()">Back</button>
        <button class="level-btn primary-btn" id="nextBtn" onclick="handleNext()" disabled>Next &rarr;</button>
      </div>
    </section>
  </main>

  <aside class="level-xp-dock" id="levelXpDock" aria-label="XP progress">
    <div class="level-xp-dock-label" id="levelXpDockLabel">LEVEL 1</div>
    <div class="level-xp-dock-bar">
      <div class="level-xp-dock-fill" id="levelXpDockFill"></div>
    </div>
    <div class="level-xp-dock-value" id="levelXpDockValue">0 / 100 XP</div>
  </aside>

  <div class="level-modal" id="resultModal">
    <div class="level-modal-box">
      <h3>Level Complete</h3>
      <p id="resultMessage">You finished this level.</p>
      <button class="level-btn primary-btn" onclick="finishLevelFlow()" id="finishLevelBtn">Next Level</button>
    </div>
  </div>

  <div class="level-modal" id="rationaleModal">
  <div class="level-modal-box">
    <h3 id="rationaleTitle">Result</h3>
    <p id="rationaleText">Explanation here...</p>
    <button class="level-btn primary-btn" id="rationaleActionBtn" onclick="closeRationale()">Continue</button>
  </div>
  </div>

  <script>
    window.goBackToLevels = window.goBackToLevels || function () {
      const params = new URLSearchParams(window.location.search);
      const subject = params.get("subject") || "electrical";
      const difficulty = params.get("difficulty") || "easy";
      window.location.href = `quiz-levels.html?subject=${subject}&difficulty=${difficulty}`;
    };
  </script>
  <script type="module" src="scripts/quiz-level.js?v=20260412l"></script>
  <script src="scripts/loading.js?v=20260412l" defer></script>
</body>
</html>
