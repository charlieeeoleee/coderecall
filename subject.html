<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subject - Code Recall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="styles/subject.css">
  <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>
  <!-- TEXT LOGO -->
  <a href="dashboard.html" class="subject-logo" aria-label="Go to dashboard">
    <span class="subject-logo-code">CODE:</span>
    <span class="subject-logo-recall">RECALL!</span>
  </a>

  <!-- THEME TOGGLE -->
  <button class="theme-toggle subject-theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="themeIcon">&#127769;</span>
  </button>

  <main class="subject-page">
    <section class="subject-header card">
      <div class="subject-header-glow"></div>
      <h1 class="subject-title" id="subjectTitle">
        ELECTRICAL WIRING AND ELECTRONICS CIRCUIT COMPONENTS
      </h1>
      <p class="subject-desc" id="subjectDesc">
        Take the pre-test, study the modules, answer quizzes, and finish the post-test.
      </p>
    </section>

    <section class="subject-actions">
      <button class="subject-card card pretest active-card" id="pretestBtn" onclick="openPretest()">
        <div class="subject-card-glow"></div>
        <div class="subject-card-inner">
          <span class="subject-badge">START HERE</span>
          <h2>Pre-Test</h2>
          <p>Take the assessment first</p>
        </div>
      </button>

      <button class="subject-card card modules locked" id="modulesBtn" onclick="openModules()">
        <span class="lock-icon">&#128274;</span>
        <div class="subject-card-glow"></div>
        <div class="subject-card-inner">
          <span class="subject-badge">STEP 2</span>
          <h2>Modules</h2>
          <p>Read the lessons</p>
        </div>
      </button>

      <button class="subject-card card quizzes locked" id="quizzesBtn" onclick="openQuiz()">
        <span class="lock-icon">&#128274;</span>
        <div class="subject-card-glow"></div>
        <div class="subject-card-inner">
          <span class="subject-badge">STEP 3</span>
          <h2>Quizzes</h2>
          <p>Answer module quizzes</p>
        </div>
      </button>

      <button class="subject-card card posttest locked" id="posttestBtn" onclick="openPosttest()">
        <span class="lock-icon">&#128274;</span>
        <div class="subject-card-glow"></div>
        <div class="subject-card-inner">
          <span class="subject-badge">FINAL</span>
          <h2>Post-Test</h2>
          <p>Final assessment</p>
        </div>
      </button>
    </section>
  </main>

  <button class="subject-back-btn" onclick="goBack()">Back</button>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const subjectParam = (params.get("subject") || "").toLowerCase();
      const unlockMode = (params.get("unlock") || "").toLowerCase();
      const savedSubject = (sessionStorage.getItem("selectedSubject") || "").toLowerCase();
      const validSubjects = new Set(["hardware", "electrical"]);
      const subject = validSubjects.has(subjectParam)
        ? subjectParam
        : validSubjects.has(savedSubject)
          ? savedSubject
          : "electrical";

      const subjectMeta = {
        electrical: {
          title: "ELECTRICAL WIRING AND ELECTRONICS CIRCUIT COMPONENTS",
          desc: "Take the pre-test, study the modules, answer quizzes, and finish the post-test."
        },
        hardware: {
          title: "COMPUTER HARDWARE",
          desc: "Take the pre-test, study the modules, answer quizzes, and finish the post-test."
        }
      };

      const meta = subjectMeta[subject] || subjectMeta.electrical;
      const titleEl = document.getElementById("subjectTitle");
      const descEl = document.getElementById("subjectDesc");

      if (titleEl) titleEl.textContent = meta.title;
      if (descEl) descEl.textContent = meta.desc;

      sessionStorage.setItem("selectedSubject", subject);

      function buildUrl(path, extraParams = {}) {
        const url = new URL(path, window.location.href);
        Object.entries(extraParams).forEach(([key, value]) => {
          if (value != null && value !== "") {
            url.searchParams.set(key, value);
          }
        });
        if (unlockMode) {
          url.searchParams.set("unlock", unlockMode);
        }
        return `${url.pathname.split("/").pop()}${url.search}`;
      }

      function unlockCard(buttonId) {
        const button = document.getElementById(buttonId);
        if (!button) return;
        button.classList.remove("locked");
        const lockIcon = button.querySelector(".lock-icon");
        if (lockIcon) lockIcon.remove();
      }

      function hasLocalCompletion(name) {
        const progressKey = `${subject}_${name}`;
        return (
          localStorage.getItem(progressKey) === "true" ||
          localStorage.getItem(`${progressKey}_done`) === "true" ||
          localStorage.getItem(`${progressKey}_attempt_done`) === "true"
        );
      }

      if (unlockMode === "modules") {
        unlockCard("modulesBtn");
      } else if (unlockMode === "quiz") {
        unlockCard("modulesBtn");
        unlockCard("quizzesBtn");
      } else if (unlockMode === "all") {
        unlockCard("modulesBtn");
        unlockCard("quizzesBtn");
        unlockCard("posttestBtn");
      } else {
        const pretestDone = hasLocalCompletion("pretest");
        const modulesDone =
          hasLocalCompletion("modules") ||
          localStorage.getItem(`${subject}_easy_modules_done`) === "true" ||
          localStorage.getItem(`${subject}_medium_modules_done`) === "true" ||
          localStorage.getItem(`${subject}_hard_modules_done`) === "true";
        const quizDone =
          hasLocalCompletion("quiz") ||
          localStorage.getItem(`${subject}_hard_quiz`) === "true";

        if (pretestDone) {
          unlockCard("modulesBtn");
        }

        if (pretestDone && modulesDone) {
          unlockCard("quizzesBtn");
        }

        if (pretestDone && modulesDone && quizDone) {
          unlockCard("posttestBtn");
        }
      }

      window.openPretest = function () {
        sessionStorage.setItem("selectedSubject", subject);
        window.location.href = buildUrl("quiz.html", { subject, level: "easy", type: "pretest" });
      };

      window.openModules = function () {
        sessionStorage.setItem("selectedSubject", subject);
        window.location.href = buildUrl("module-difficulty.html", { subject });
      };

      window.openQuiz = function () {
        sessionStorage.setItem("selectedSubject", subject);
        window.location.href = buildUrl("quiz-difficulty.html", { subject });
      };

      window.openPosttest = function () {
        sessionStorage.setItem("selectedSubject", subject);
        window.location.href = buildUrl("quiz.html", { subject, level: "easy", type: "posttest" });
      };

      window.goBack = function () {
        window.location.href = "dashboard.html";
      };
    })();
  </script>
  <script type="module" src="scripts/subject.js?v=20260407f"></script>
  <script src="scripts/loading.js?v=20260407f" defer></script>
</body>
</html>
